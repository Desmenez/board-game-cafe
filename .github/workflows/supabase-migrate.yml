# Apply supabase/migrations to the linked project on merge to main.
# Requires GitHub secrets (skip job if any missing — guest-only repos stay green):
#   SUPABASE_ACCESS_TOKEN  — Account → Access Tokens
#   SUPABASE_PROJECT_ID    — project ref from dashboard URL
#   SUPABASE_DB_PASSWORD   — Database settings → Database password
#
# If you already pasted the migration in the SQL Editor once, mark it applied
# before the first CI push (see supabase/README.md) or the CREATE will conflict.

name: Supabase migrate

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Check secrets
        id: check
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ] || [ -z "${SUPABASE_PROJECT_ID:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Missing SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_ID / SUPABASE_DB_PASSWORD — skip migrate."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'

      - uses: supabase/setup-cli@v1
        if: steps.check.outputs.configured == 'true'
        with:
          version: latest

      - name: Link project
        if: steps.check.outputs.configured == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        if: steps.check.outputs.configured == 'true'
        run: supabase db push --include-all --yes
