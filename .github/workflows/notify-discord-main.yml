# Temporarily disabled — restore `push: branches: [main]` and remove `if: false` to re-enable.
name: Notify Discord (main)

on:
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discord:
    # Temporarily disabled — restore `if: false` and remove `if: true` to re-enable.
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # No `version:` — pnpm is pinned via the `packageManager` field in
      # package.json (pnpm@9.15.9); setting both makes action-setup error.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install & build server (registry สำหรับ Discord)
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter shared build
          pnpm --filter server build

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_AFTER: ${{ github.event.after || github.sha }}
          MANUAL_DIFF: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF: ${{ github.ref }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: node scripts/notify-discord-main.mjs
