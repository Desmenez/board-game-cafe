name: Build and Push Server Image

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      # Workflow / image definition
      - .github/workflows/docker-publish.yml
      - packages/server/**
      # Server runtime + build deps (Dockerfile copies shared; client only package.json)
      - packages/shared/**
      - packages/client/package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - package.json
      - tsconfig.base.json

jobs:
  docker:
    # Native arm64 for Mac Mini M2 / Apple Silicon (avoid QEMU + pnpm/esbuild SIGILL).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: napatpon/board-game-server
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
